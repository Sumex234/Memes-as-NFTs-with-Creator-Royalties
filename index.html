<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme NFT Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🔥 MemeNFT</h1>
            </div>
            <div class="nav-links">
                <button class="nav-btn" onclick="showSection('marketplace')">Marketplace</button>
                <button class="nav-btn" onclick="showSection('mint')">Mint</button>
                <button class="nav-btn" onclick="showSection('profile')">Profile</button>
                <button class="connect-btn" onclick="connectWallet()">Connect Wallet</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="marketplace" class="section active">
            <div class="container">
                <h2>🚀 Trending Memes</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search memes by title or creator...">
                    <button onclick="searchMemes()">Search</button>
                </div>
                <div class="meme-grid" id="memeGrid">
                </div>
            </div>
        </section>

        <section id="mint" class="section">
            <div class="container">
                <h2>🎨 Mint Your Meme</h2>
                <form class="mint-form" onsubmit="mintMeme(event)">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" maxlength="100" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" maxlength="500" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl">Image URL</label>
                        <input type="url" id="imageUrl" maxlength="200" required>
                    </div>
                    <div class="form-group">
                        <label for="royalty">Royalty Percentage</label>
                        <input type="number" id="royalty" min="0" max="10" step="0.1" required>
                        <small>Enter percentage (0-10%)</small>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags</label>
                        <input type="text" id="tags" maxlength="200" placeholder="funny, viral, comedy">
                    </div>
                    <button type="submit" class="mint-btn">Mint Meme NFT</button>
                </form>
            </div>
        </section>

        <section id="profile" class="section">
            <div class="container">
                <h2>👤 Your Profile</h2>
                <div class="profile-content">
                    <div class="profile-form">
                        <h3>Create Profile</h3>
                        <form onsubmit="createProfile(event)">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" maxlength="50" required>
                            </div>
                            <div class="form-group">
                                <label for="bio">Bio</label>
                                <textarea id="bio" maxlength="200"></textarea>
                            </div>
                            <button type="submit">Create Profile</button>
                        </form>
                    </div>
                    <div class="profile-stats" id="profileStats">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="memeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="memeDetails"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
